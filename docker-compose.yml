services:
  db:
    image: ankane/pgvector:latest
    restart: unless-stopped
    environment:
      POSTGRES_USER: biuro
      POSTGRES_DB: autonomiczne_biuro
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U biuro -d autonomiczne_biuro"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build: 
      context: .
      dockerfile: packages/server/Dockerfile
    command: pnpm start
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://biuro:${DB_PASSWORD:?DB_PASSWORD is required}@db:5432/autonomiczne_biuro
      PORT: 3100
      AUTH_ENABLED: ${AUTH_ENABLED:-true}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
      MAX_CONCURRENT_HEARTBEATS: ${MAX_CONCURRENT_HEARTBEATS:-20}
    ports:
      - "3100:3100"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/api/health >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  worker:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    command: pnpm worker
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://biuro:${DB_PASSWORD:?DB_PASSWORD is required}@db:5432/autonomiczne_biuro
      AUTH_ENABLED: ${AUTH_ENABLED:-true}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
      MAX_CONCURRENT_HEARTBEATS: ${MAX_CONCURRENT_HEARTBEATS:-20}
    depends_on:
      db:
        condition: service_healthy

  dashboard:
    build:
      context: .
      dockerfile: packages/dashboard/Dockerfile
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  pgdata:
