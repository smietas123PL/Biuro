services:
  db:
    image: ankane/pgvector:latest
    environment:
      POSTGRES_USER: biuro
      POSTGRES_DB: autonomiczne_biuro
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build: 
      context: .
      dockerfile: packages/server/Dockerfile
    command: pnpm start
    environment:
      DATABASE_URL: postgres://biuro:password@db:5432/autonomiczne_biuro
      PORT: 3100
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
    ports:
      - "3100:3100"
    depends_on:
      - db

  worker:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    command: pnpm worker
    environment:
      DATABASE_URL: postgres://biuro:password@db:5432/autonomiczne_biuro
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
    depends_on:
      - db

  dashboard:
    build:
      context: .
      dockerfile: packages/dashboard/Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - server

volumes:
  pgdata:
