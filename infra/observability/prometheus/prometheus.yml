global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: biuro-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - server:3100
        labels:
          service: biuro-api

  - job_name: biuro-worker
    metrics_path: /metrics
    static_configs:
      - targets:
          - worker:9464
        labels:
          service: biuro-worker
